<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pantry — Salt Fat Acid Heat</title>
  <meta name="description" content="Pantry & shopping tracker for 2 people in Cleveland, OH" />
  <meta name="theme-color" content="#3B6D11" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pantry" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sage: #3B6D11; --sage-light: #EAF3DE; --sage-mid: #639922; --sage-dark: #27500A;
      --amber: #BA7517; --amber-light: #FAEEDA;
      --red: #E24B4A; --red-light: #FCEBEB;
      --gray-100: #EFEFEB; --gray-200: #D3D1C7; --gray-400: #888780;
      --gray-600: #5F5E5A; --gray-900: #1C1C1A; --white: #FFFFFF;
      --radius-sm: 8px; --radius-md: 12px;
      --font: 'Georgia', serif;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --nav-h: 64px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body { height: 100%; background: #F8F7F4; color: var(--gray-900); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
    #app { display: flex; flex-direction: column; height: 100%; max-width: 480px; margin: 0 auto; background: var(--white); box-shadow: 0 0 40px rgba(0,0,0,0.08); }

    /* HEADER */
    .app-header { padding: 52px 20px 16px; background: var(--sage); color: white; }
    .app-header h1 { font-family: var(--font); font-size: 28px; font-weight: normal; letter-spacing: -0.5px; }
    .budget-block { background: rgba(255,255,255,0.15); border-radius: var(--radius-sm); padding: 10px 14px; margin-top: 10px; }
    .budget-block:first-of-type { margin-top: 14px; }
    .budget-label { font-size: 10px; opacity: 0.75; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
    .budget-amounts { display: flex; align-items: baseline; justify-content: space-between; }
    .budget-spent { font-size: 20px; font-weight: 600; }
    .budget-limit { font-size: 12px; opacity: 0.7; }
    .budget-bar-bg { background: rgba(255,255,255,0.2); border-radius: 4px; height: 4px; margin-top: 8px; overflow: hidden; }
    .budget-bar-fill { height: 100%; border-radius: 4px; background: white; transition: width 0.4s; }
    .budget-bar-fill.over { background: #F09595; }

    /* LAYOUT */
    .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px); }
    .panel { display: none; padding: 20px; }
    .section-label { font-size: 10px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
    .card { background: var(--white); border: 1px solid var(--gray-100); border-radius: var(--radius-md); margin-bottom: 12px; overflow: hidden; padding: 16px; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--gray-400); font-size: 14px; }

    /* NAV */
    .bottom-nav { position: sticky; bottom: 0; background: var(--white); border-top: 1px solid var(--gray-100); display: flex; padding-bottom: var(--safe-bottom); z-index: 10; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px; border: none; background: none; cursor: pointer; color: var(--gray-400); font-size: 10px; font-family: var(--font-sans); text-transform: uppercase; letter-spacing: 0.05em; transition: color 0.15s; }
    .nav-btn svg { width: 22px; height: 22px; }
    .nav-btn.active { color: var(--sage); }

    /* PANTRY */
    .cat-header { font-size: 10px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.1em; padding: 10px 0 6px; border-bottom: 1px solid var(--gray-100); }
    .pantry-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: var(--radius-sm); margin-bottom: 4px; border: 1px solid transparent; transition: all 0.15s; }
    .pantry-item.status-ok  { background: var(--sage-light);  border-color: #C0DD97; }
    .pantry-item.status-low { background: var(--amber-light); border-color: #FAC775; }
    .pantry-item.status-out { background: var(--red-light);   border-color: #F7C1C1; }
    .item-name { font-size: 14px; color: var(--gray-900); font-weight: 500; }
    .status-btns { display: flex; gap: 4px; }
    .sbtn { height: 28px; border-radius: 6px; border: 1px solid transparent; background: rgba(255,255,255,0.6); font-size: 11px; font-weight: 500; cursor: pointer; padding: 0 10px; font-family: var(--font-sans); color: var(--gray-600); transition: all 0.15s; white-space: nowrap; }
    .sbtn.active-ok  { background: var(--sage);  color: white; border-color: var(--sage-dark); }
    .sbtn.active-low { background: var(--amber); color: white; border-color: #633806; }
    .sbtn.active-out { background: var(--red);   color: white; border-color: #791F1F; }

    /* PROTEIN CARDS */
    .protein-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .pcard { border: 1.5px solid var(--gray-200); border-radius: var(--radius-md); padding: 14px; cursor: pointer; transition: all 0.15s; background: var(--white); }
    .pcard:active { transform: scale(0.97); }
    .pcard.selected { border-color: var(--sage); background: var(--sage-light); }
    .pcard-name { font-size: 14px; font-weight: 600; color: var(--gray-900); }
    .pcard-cost { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
    .pcard-badge { margin-top: 8px; font-size: 11px; color: var(--sage); font-weight: 600; }

    /* PAIRING CARDS */
    .pairing-section { margin-bottom: 20px; }
    .pairing-protein-label { font-size: 12px; font-weight: 600; color: var(--gray-900); margin-bottom: 8px; }
    .pairing-option { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); margin-bottom: 6px; cursor: pointer; transition: all 0.15s; background: var(--white); }
    .pairing-option:active { transform: scale(0.98); }
    .pairing-option.selected { border-color: var(--sage); background: var(--sage-light); }
    .pairing-option-dot { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--gray-200); flex-shrink: 0; transition: all 0.15s; }
    .pairing-option.selected .pairing-option-dot { background: var(--sage); border-color: var(--sage); }
    .pairing-option-text { font-size: 13px; color: var(--gray-900); }

    /* TRIP CHECKLIST */
    .trip-prompt { text-align: center; padding: 32px 20px; }
    .trip-prompt-text { font-size: 14px; color: var(--gray-600); line-height: 1.5; }
    .checklist-section { margin-bottom: 20px; }
    .checklist-section-label { font-size: 10px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .checklist-item { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 0.5px solid var(--gray-100); cursor: pointer; }
    .checklist-item:last-child { border-bottom: none; }
    .checklist-item.checked .check-label { color: var(--gray-400); text-decoration: line-through; }
    .check-box { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--gray-200); background: var(--white); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
    .checklist-item.checked .check-box { background: var(--sage); border-color: var(--sage); }
    .check-tick { display: none; color: white; font-size: 13px; font-weight: 600; }
    .checklist-item.checked .check-tick { display: block; }
    .check-label { font-size: 14px; color: var(--gray-900); }
    .check-sub { font-size: 11px; color: var(--gray-400); margin-top: 1px; }
    .progress-bar-wrap { background: var(--gray-100); border-radius: 4px; height: 4px; margin-bottom: 16px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--sage); border-radius: 4px; transition: width 0.3s; }
    .trip-complete-bar { border-top: 1px solid var(--gray-100); padding-top: 16px; margin-top: 8px; }
    .cost-input { width: 100%; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 16px; font-family: var(--font-sans); color: var(--gray-900); background: var(--white); margin-bottom: 12px; }
    .cost-input:focus { outline: none; border-color: var(--sage); }

    /* TRIP HISTORY */
    .trip-history-card { border: 1px solid var(--gray-100); border-radius: var(--radius-md); padding: 14px; margin-bottom: 10px; }
    .trip-history-hdr { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
    .trip-history-date { font-size: 13px; font-weight: 600; color: var(--gray-900); }
    .trip-history-cost { font-size: 13px; color: var(--sage); font-weight: 600; }
    .trip-history-items { font-size: 12px; color: var(--gray-600); line-height: 1.5; }

    /* BUTTONS */
    .btn-sage { display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: 12px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; font-family: var(--font-sans); cursor: pointer; border: none; background: var(--sage); color: white; transition: opacity 0.15s; }
    .btn-sage:active { opacity: 0.85; }
  </style>
</head>
<body>
<div id="app">

  <div class="app-header">
    <h1>Pantry</h1>
    <div class="budget-block">
      <div class="budget-label">This week</div>
      <div class="budget-amounts">
        <span class="budget-spent" id="week-spent">$0</span>
        <span class="budget-limit">of $200</span>
      </div>
      <div class="budget-bar-bg"><div class="budget-bar-fill" id="week-bar" style="width:0%"></div></div>
    </div>
    <div class="budget-block">
      <div class="budget-label">This month</div>
      <div class="budget-amounts">
        <span class="budget-spent" id="month-spent">$0</span>
        <span class="budget-limit">of $800</span>
      </div>
      <div class="budget-bar-bg"><div class="budget-bar-fill" id="month-bar" style="width:0%"></div></div>
    </div>
  </div>

  <div class="scroll-area">

    <!-- PANTRY -->
    <div id="panel-pantry" class="panel">
      <div class="card" id="pantry-list"></div>
    </div>

    <!-- TRIPS -->
    <div id="panel-trips" class="panel">
      <div class="section-label">Step 1 — Select proteins</div>
      <div class="protein-grid" id="protein-grid"></div>
      <div id="pairing-section"></div>
      <div id="trip-checklist-area"></div>
      <div class="section-label" style="margin-top:24px">Trip history</div>
      <div id="trip-history"></div>
    </div>

  </div>

  <nav class="bottom-nav">
    <button class="nav-btn" id="nav-pantry" onclick="switchPanel('pantry', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Pantry
    </button>
    <button class="nav-btn" id="nav-trips" onclick="switchPanel('trips', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Trips
    </button>
  </nav>
</div>

<script type="module">
// ── DATA ──
const PANTRY_ITEMS = [
  // Oils & fats
  {name:'Olive oil',             cat:'Oils & fats'},
  {name:'Unsalted butter',       cat:'Oils & fats'},
  {name:'Cooking spray',         cat:'Oils & fats'},

  // Spices & seasonings
  {name:'Kosher salt',           cat:'Spices & seasonings'},
  {name:'Black pepper',          cat:'Spices & seasonings'},
  {name:'Red pepper flakes',     cat:'Spices & seasonings'},
  {name:'Cumin',                 cat:'Spices & seasonings'},
  {name:'Smoked paprika',        cat:'Spices & seasonings'},
  {name:'Dried oregano',         cat:'Spices & seasonings'},
  {name:'Garlic powder',         cat:'Spices & seasonings'},
  {name:'Onion powder',          cat:'Spices & seasonings'},
  {name:'Cinnamon',              cat:'Spices & seasonings'},

  // Sauces & condiments
  {name:'Soy sauce',             cat:'Sauces & condiments'},
  {name:'Dijon mustard',         cat:'Sauces & condiments'},

  // Canned & dry goods
  {name:'Canned whole tomatoes', cat:'Canned & dry goods'},
  {name:'Pasta',                 cat:'Canned & dry goods'},
  {name:'Basmati or jasmine rice', cat:'Canned & dry goods'},
  {name:'Chicken stock',         cat:'Canned & dry goods'},

  // Vinegars
  {name:'Red wine vinegar',      cat:'Vinegars'},
  {name:'Apple cider vinegar',   cat:'Vinegars'},
  {name:'White vinegar',         cat:'Vinegars'},
];

const ALWAYS_BUY = [
  'Garlic (2 heads)', 'Yellow onions (3-4)', 'Lemons (6-8)',
  'Carrots', 'Celery', 'Bananas or apples',
  'Eggs', 'Milk', 'Orange juice',
  'Sourdough bread', 'Sandwich bread',
];

const SPRING_PRODUCE = ['Spinach', 'Arugula', 'Swiss chard', 'Kale'];

const PROTEINS = [
  {name:'Chicken thighs',  cost:'~$10 / week', pairings:[
    'Lemons + yogurt',
    'White wine + capers',
    'Dijon mustard + white wine vinegar',
    'Buttermilk',
  ]},
  {name:'Salmon',          cost:'~$14 / week', pairings:[
    'Lemons + capers',
    'Miso + rice vinegar',
    'Dijon + white wine',
    'Soy sauce + rice vinegar',
  ]},
  {name:'Ground beef',     cost:'~$9 / week',  pairings:[
    'Canned whole tomatoes + red wine vinegar',
    'Worcestershire + Dijon',
    'Soy sauce + rice vinegar',
  ]},
  {name:'Shrimp',          cost:'~$12 / week', pairings:[
    'Lemon + capers',
    'Garlic butter + white wine',
    'Lime + apple cider vinegar',
    'Miso + rice vinegar',
  ]},
  {name:'Pork chops',      cost:'~$10 / week', pairings:[
    'Apple cider vinegar + Dijon',
    'Balsamic + rosemary',
    'Orange juice + red wine vinegar',
    'Soy sauce + ginger',
  ]},
  {name:'Lamb',            cost:'~$14 / week', pairings:[
    'Lemon + red wine vinegar + yogurt',
    'Pomegranate + balsamic',
    'Harissa + yogurt',
    'Mint + white wine vinegar',
  ]},
  {name:'White fish',      cost:'~$12 / week', pairings:[
    'Lemon + capers',
    'Brown butter + white wine',
    'Miso + rice vinegar',
    'Canned whole tomatoes + white wine',
  ]},
  {name:'Italian sausage', cost:'~$9 / week',  pairings:[
    'Canned whole tomatoes + red wine vinegar',
    'White wine + fennel',
    'Balsamic + onions',
  ]},
  {name:'Tofu',            cost:'~$6 / week',  pairings:[
    'Soy sauce + rice vinegar',
    'Miso + sesame + rice vinegar',
    'Lime + apple cider vinegar',
  ]},
  {name:'Chicken breasts', cost:'~$10 / week', pairings:[
    'Lemon + Dijon mustard',
    'White wine + capers',
    'Buttermilk',
    'Pomegranate molasses + red wine vinegar',
  ]},
  {name:'Skirt steak',     cost:'~$13 / week', pairings:[
    'Red wine vinegar + lemon',
    'Soy sauce + lime',
    'Worcestershire + Dijon',
  ]},
  {name:'Roast chicken',   cost:'~$12 / week', pairings:[
    'Lemons + yogurt',
    'White wine + capers',
    'Dijon mustard + white wine vinegar',
    'Preserved lemon + olive oil',
  ]},
];

// ── STATE ──
let pantryStatus     = {};
let tripsState       = [];
let checklistState   = {};
let selectedProteins = [];
let selectedPairings = {};
let dbReady          = false;

// ── FIREBASE ──
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB-uWbHcpSmFT9eym5cJy0sduYajmUMusg",
  authDomain: "pantry-app-55c64.firebaseapp.com",
  databaseURL: "https://pantry-app-55c64-default-rtdb.firebaseio.com",
  projectId: "pantry-app-55c64",
  storageBucket: "pantry-app-55c64.firebasestorage.app",
  messagingSenderId: "835490256666",
  appId: "1:835490256666:web:97e12c1d24cffcee403ea3"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getDatabase(firebaseApp);

// ── PERSIST ──
function persist() {
  update(ref(db, 'pantry'), {
    pantryStatus,
    tripsState,
    selectedProteins,
    selectedPairings,
  });
}

function persistChecklist() {
  set(ref(db, 'pantry/checklistState'), checklistState);
}

// ── UTILITIES ──
function parseCost(str) {
  if (!str || str === '-') return 0;
  const n = parseFloat(str.replace(/[^0-9.]/g, ''));
  return isNaN(n) ? 0 : n;
}

function capitalize(str) {
  return str.replace(/\b\w/g, c => c.toUpperCase());
}

function isAlreadyCovered(item) {
  const words = item.toLowerCase().split(/\s+/).filter(w => w.length > 3);
  const pantryNames   = PANTRY_ITEMS.map(i => i.name.toLowerCase());
  const alwaysBuyNames = ALWAYS_BUY.map(a => a.toLowerCase());
  return pantryNames.some(p => words.some(w => p.includes(w))) ||
         alwaysBuyNames.some(b => words.some(w => b.includes(w)));
}

// ── BUDGET ──
function renderBudget() {
  const now = new Date();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - now.getDay());
  weekStart.setHours(0, 0, 0, 0);
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

  const weekSpent  = tripsState.filter(t => new Date(t.date) >= weekStart).reduce((s,t)  => s + parseCost(t.cost), 0);
  const monthSpent = tripsState.filter(t => new Date(t.date) >= monthStart).reduce((s,t) => s + parseCost(t.cost), 0);

  document.getElementById('week-spent').textContent  = '$' + weekSpent.toFixed(0);
  document.getElementById('month-spent').textContent = '$' + monthSpent.toFixed(0);

  const wb = document.getElementById('week-bar');
  wb.style.width = Math.min((weekSpent / 200) * 100, 100) + '%';
  wb.classList.toggle('over', weekSpent > 200);

  const mb = document.getElementById('month-bar');
  mb.style.width = Math.min((monthSpent / 800) * 100, 100) + '%';
  mb.classList.toggle('over', monthSpent > 800);
}

// ── PANTRY ──
function renderPantry() {
  const categories = [...new Set(PANTRY_ITEMS.map(i => i.cat))];
  document.getElementById('pantry-list').innerHTML = categories.map(cat => {
    const items = PANTRY_ITEMS.filter(i => i.cat === cat);
    return `<div class="cat-header">${cat}</div>` +
      items.map(item => {
        const s = pantryStatus[item.name] || 'ok';
        return `<div class="pantry-item status-${s}">
          <div class="item-name">${item.name}</div>
          <div class="status-btns">
            <button class="sbtn ${s==='ok'?'active-ok':''}"  onclick="setStatus('${item.name}','ok')">Stocked</button>
            <button class="sbtn ${s==='low'?'active-low':''}" onclick="setStatus('${item.name}','low')">Low</button>
            <button class="sbtn ${s==='out'?'active-out':''}" onclick="setStatus('${item.name}','out')">Out</button>
          </div>
        </div>`;
      }).join('');
  }).join('');
}

function setStatus(name, status) {
  pantryStatus[name] = status;
  persist();
  renderPantry();
}

// ── PROTEIN CARDS ──
function renderProteins() {
  document.getElementById('protein-grid').innerHTML = PROTEINS.map((p,i) => {
    const sel = selectedProteins.includes(i);
    return `<div class="pcard ${sel?'selected':''}" onclick="toggleProtein(${i})">
      <div class="pcard-name">${p.name}</div>
      <div class="pcard-cost">${p.cost}</div>
      ${sel ? '<div class="pcard-badge">✓ Selected</div>' : ''}
    </div>`;
  }).join('');
  renderPairings();
}

function toggleProtein(i) {
  const idx = selectedProteins.indexOf(i);
  if (idx === -1) {
    selectedProteins.push(i);
  } else {
    selectedProteins.splice(idx, 1);
    delete selectedPairings[i];
  }
  checklistState = {};
  persistChecklist();
  persist();
  renderProteins();
}

// ── PAIRING SELECTION ──
function renderPairings() {
  const el = document.getElementById('pairing-section');
  if (!selectedProteins.length) { el.innerHTML = ''; renderChecklist(); return; }

  el.innerHTML = `
    <div class="section-label" style="margin-top:20px">Step 2 — Select pairings</div>
    ${selectedProteins.map(i => {
      const p = PROTEINS[i];
      return `<div class="pairing-section">
        <div class="pairing-protein-label">${p.name}</div>
        ${p.pairings.map((pairing, pi) => {
          const sel = selectedPairings[i] === pi;
          return `<div class="pairing-option ${sel?'selected':''}" onclick="selectPairing(${i},${pi})">
            <div class="pairing-option-dot"></div>
            <div class="pairing-option-text">${pairing.split('+').map(a => capitalize(a.trim())).join(' + ')}</div>
          </div>`;
        }).join('')}
      </div>`;
    }).join('')}`;

  renderChecklist();
}

function selectPairing(proteinIdx, pairingIdx) {
  selectedPairings[proteinIdx] = pairingIdx;
  checklistState = {};
  persistChecklist();
  persist();
  renderPairings();
}

// ── TRIP CHECKLIST ──
function buildChecklist() {
  if (!selectedProteins.length) return null;

  // Only build list if all selected proteins have a pairing chosen
  const allPaired = selectedProteins.every(i => selectedPairings[i] !== undefined);
  if (!allPaired) return null;

  const sections = [];

  sections.push({
    label: 'Proteins',
    items: selectedProteins.map(i => ({ id:'protein_'+i, name:PROTEINS[i].name, sub:PROTEINS[i].cost }))
  });

  const allAcids = [];
  const seen = new Set();
  selectedProteins.forEach(i => {
    const pairing = PROTEINS[i].pairings[selectedPairings[i]];
    pairing.split('+').map(a => capitalize(a.trim())).forEach(a => {
      if (!seen.has(a) && !isAlreadyCovered(a)) { seen.add(a); allAcids.push(a); }
    });
  });
  if (allAcids.length) {
    sections.push({ label:'Acid & dairy', items:allAcids.map((a,i) => ({ id:'acid_'+i, name:a })) });
  }

  sections.push({ label:'Always buy',    items:ALWAYS_BUY.map((a,i)     => ({ id:'always_'+i,  name:a })) });
  sections.push({ label:'Spring produce', items:SPRING_PRODUCE.map((a,i) => ({ id:'produce_'+i, name:a })) });

  const restock = PANTRY_ITEMS.filter(i => pantryStatus[i.name] === 'low' || pantryStatus[i.name] === 'out');
  if (restock.length) {
    sections.push({
      label: 'Restock',
      items: restock.map(i => ({ id:'restock_'+i.name, name:i.name, sub:pantryStatus[i.name]==='out'?'Out':'Running low' }))
    });
  }

  return sections;
}

function renderChecklist() {
  const el = document.getElementById('trip-checklist-area');
  const sections = buildChecklist();

  if (!selectedProteins.length) {
    el.innerHTML = '';
    return;
  }

  if (!sections) {
    el.innerHTML = '<div class="trip-prompt"><div class="trip-prompt-text">Select a pairing for each protein above to generate your shopping list.</div></div>';
    return;
  }

  const allItems = sections.flatMap(s => s.items);
  const progress = Math.round((allItems.filter(i => checklistState[i.id]).length / allItems.length) * 100);

  el.innerHTML = `
    <div class="section-label">Shopping list</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${progress}%"></div></div>
    ${sections.map(s => `
      <div class="checklist-section">
        <div class="checklist-section-label">${s.label}</div>
        <div class="card" style="padding:0 16px;">
          ${s.items.map(item => `
            <div class="checklist-item ${checklistState[item.id]?'checked':''}" onclick="toggleCheck('${item.id}')">
              <div class="check-box"><span class="check-tick">✓</span></div>
              <div>
                <div class="check-label">${item.name}</div>
                ${item.sub ? `<div class="check-sub">${item.sub}</div>` : ''}
              </div>
            </div>`).join('')}
        </div>
      </div>`).join('')}
    <div class="trip-complete-bar">
      <input class="cost-input" type="text" id="trip-cost-input" placeholder="Total cost (e.g. $147)" />
      <button class="btn-sage" onclick="completeTrip()">Complete trip</button>
    </div>`;
}

function toggleCheck(id) {
  checklistState[id] = !checklistState[id];
  persistChecklist();
  renderChecklist();
}

function completeTrip() {
  const sections = buildChecklist();
  if (!sections) return;
  const cost  = document.getElementById('trip-cost-input')?.value.trim() || '-';
  const date  = new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
  const items = sections.flatMap(s => s.items.map(i => i.name)).join(', ');
  tripsState.push({date, items, cost});
  checklistState   = {};
  selectedProteins = [];
  selectedPairings = {};
  persistChecklist();
  persist();
  renderBudget();
  renderProteins();
  renderChecklist();
  renderTrips();
}

function renderTrips() {
  const el = document.getElementById('trip-history');
  if (!tripsState.length) {
    el.innerHTML = '<div class="empty-state">No trips logged yet.</div>';
    return;
  }
  el.innerHTML = tripsState.slice().reverse().map(t => `
    <div class="trip-history-card">
      <div class="trip-history-hdr">
        <div class="trip-history-date">${t.date}</div>
        <div class="trip-history-cost">${t.cost}</div>
      </div>
      <div class="trip-history-items">${t.items}</div>
    </div>`).join('');
}

// ── NAV ──
function switchPanel(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).style.display = 'block';
  btn.classList.add('active');
  if (name === 'trips') { renderProteins(); renderPairings(); renderChecklist(); }
}

// ── INIT ──
function init() {
  document.getElementById('panel-pantry').style.display = 'block';
  document.getElementById('nav-pantry').classList.add('active');

  // Listen for real-time updates from Firebase
  onValue(ref(db, 'pantry'), (snapshot) => {
    const data = snapshot.val() || {};
    pantryStatus     = data.pantryStatus     || {};
    tripsState       = data.tripsState       || [];
    checklistState   = data.checklistState   || {};
    selectedProteins = data.selectedProteins || [];
    selectedPairings = data.selectedPairings || {};
    dbReady = true;
    renderBudget();
    renderPantry();
    renderProteins();
    renderPairings();
    renderChecklist();
    renderTrips();
  });
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
