<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pantry — Salt Fat Acid Heat</title>
  <meta name="description" content="Pantry & shopping tracker for 2 people in Cleveland, OH" />
  <meta name="theme-color" content="#3B6D11" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pantry" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sage: #3B6D11;
      --sage-light: #EAF3DE;
      --sage-mid: #639922;
      --sage-dark: #27500A;
      --amber: #BA7517;
      --amber-light: #FAEEDA;
      --red: #E24B4A;
      --red-light: #FCEBEB;
      --gray-50: #F8F7F4;
      --gray-100: #EFEFEB;
      --gray-200: #D3D1C7;
      --gray-400: #888780;
      --gray-600: #5F5E5A;
      --gray-900: #1C1C1A;
      --white: #FFFFFF;
      --radius-sm: 8px;
      --radius-md: 12px;
      --font: 'Georgia', serif;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --nav-h: 64px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body { height: 100%; background: var(--gray-50); color: var(--gray-900); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
    #app { display: flex; flex-direction: column; height: 100%; max-width: 480px; margin: 0 auto; background: var(--white); position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.08); }

    /* HEADER */
    .app-header { padding: 52px 20px 16px; background: var(--sage); color: white; }
    .app-header h1 { font-family: var(--font); font-size: 28px; font-weight: normal; letter-spacing: -0.5px; }
    .budget-row { display: flex; gap: 10px; margin-top: 14px; }
    .budget-block { flex: 1; background: rgba(255,255,255,0.15); border-radius: var(--radius-sm); padding: 10px 14px; }
    .budget-label { font-size: 10px; opacity: 0.75; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
    .budget-amounts { display: flex; align-items: baseline; justify-content: space-between; }
    .budget-spent { font-size: 20px; font-weight: 600; }
    .budget-limit { font-size: 12px; opacity: 0.7; }
    .budget-bar-bg { background: rgba(255,255,255,0.2); border-radius: 4px; height: 4px; margin-top: 8px; overflow: hidden; }
    .budget-bar-fill { height: 100%; border-radius: 4px; background: white; transition: width 0.4s; }
    .budget-bar-fill.over { background: #F09595; }

    /* LAYOUT */
    .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px); }
    .panel { display: none; padding: 20px; }
    .panel.active { display: block; }
    .section-label { font-size: 10px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
    .card { background: var(--white); border: 1px solid var(--gray-100); border-radius: var(--radius-md); margin-bottom: 12px; overflow: hidden; }
    .card-body { padding: 16px; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--gray-400); font-size: 14px; }

    /* NAV */
    .bottom-nav { position: sticky; bottom: 0; background: var(--white); border-top: 1px solid var(--gray-100); display: flex; padding-bottom: var(--safe-bottom); z-index: 10; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px; border: none; background: none; cursor: pointer; color: var(--gray-400); font-size: 10px; font-family: var(--font-sans); text-transform: uppercase; letter-spacing: 0.05em; transition: color 0.15s; }
    .nav-btn svg { width: 22px; height: 22px; }
    .nav-btn.active { color: var(--sage); }

    /* PANTRY */
    .pantry-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: var(--radius-sm); margin-bottom: 4px; border: 1px solid transparent; transition: all 0.15s; }
    .pantry-item.status-ok { background: var(--sage-light); border-color: #C0DD97; }
    .pantry-item.status-low { background: var(--amber-light); border-color: #FAC775; }
    .pantry-item.status-out { background: var(--red-light); border-color: #F7C1C1; }
    .item-name { font-size: 14px; color: var(--gray-900); font-weight: 500; }
    .status-btns { display: flex; gap: 4px; }
    .sbtn { height: 28px; border-radius: 6px; border: 1px solid transparent; background: rgba(255,255,255,0.6); font-size: 11px; font-weight: 500; cursor: pointer; padding: 0 10px; font-family: var(--font-sans); color: var(--gray-600); transition: all 0.15s; white-space: nowrap; }
    .sbtn.active-ok { background: var(--sage); color: white; border-color: var(--sage-dark); }
    .sbtn.active-low { background: var(--amber); color: white; border-color: #633806; }
    .sbtn.active-out { background: var(--red); color: white; border-color: #791F1F; }
    .cat-header { font-size: 10px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.1em; padding: 10px 0 6px; border-bottom: 1px solid var(--gray-100); }

    /* PROTEIN CARDS */
    .protein-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .pcard { border: 1.5px solid var(--gray-200); border-radius: var(--radius-md); padding: 14px; cursor: pointer; transition: all 0.15s; background: var(--white); }
    .pcard:active { transform: scale(0.97); }
    .pcard.selected { border-color: var(--sage); background: var(--sage-light); }
    .pcard-name { font-size: 14px; font-weight: 600; color: var(--gray-900); }
    .pcard-cost { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
    .pcard-acid-label { font-size: 10px; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 8px; }
    .pcard-acid { font-size: 11px; color: var(--gray-400); margin-top: 4px; font-style: italic; }
    .change-btn { background: none; border: 1px solid var(--sage-mid); border-radius: var(--radius-sm); padding: 6px 12px; font-size: 12px; color: var(--sage-dark); cursor: pointer; font-family: var(--font-sans); white-space: nowrap; }

    /* ROTATION LOG */
    .rotation-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--gray-100); }
    .rotation-row:last-child { border-bottom: none; }
    .rot-left { display: flex; align-items: center; gap: 12px; }
    .week-label { font-size: 12px; color: var(--gray-400); min-width: 80px; }
    .week-protein { font-size: 14px; color: var(--gray-900); font-weight: 500; }
    .week-acid { font-size: 11px; color: var(--gray-400); font-style: italic; margin-top: 2px; }
    .remove-btn { background: none; border: none; cursor: pointer; color: var(--gray-400); font-size: 18px; padding: 2px 6px; border-radius: var(--radius-sm); line-height: 1; }
    .remove-btn:hover { color: var(--red); background: var(--red-light); }
    .rot-empty { font-size: 13px; color: var(--gray-400); padding: 12px 0; font-style: italic; }

    /* TRIP CHECKLIST */
    .trip-prompt { text-align: center; padding: 32px 20px; }
    .trip-prompt-text { font-size: 14px; color: var(--gray-600); line-height: 1.5; }
    .checklist-section { margin-bottom: 20px; }
    .checklist-section-label { font-size: 10px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .checklist-item { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 0.5px solid var(--gray-100); cursor: pointer; }
    .checklist-item:last-child { border-bottom: none; }
    .checklist-item.checked .check-label { color: var(--gray-400); text-decoration: line-through; }
    .check-box { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--gray-200); background: var(--white); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
    .checklist-item.checked .check-box { background: var(--sage); border-color: var(--sage); }
    .check-tick { display: none; color: white; font-size: 13px; font-weight: 600; }
    .checklist-item.checked .check-tick { display: block; }
    .check-label { font-size: 14px; color: var(--gray-900); }
    .check-sub { font-size: 11px; color: var(--gray-400); margin-top: 1px; }
    .trip-complete-bar { border-top: 1px solid var(--gray-100); padding-top: 16px; margin-top: 8px; }
    .cost-input { width: 100%; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 16px; font-family: var(--font-sans); color: var(--gray-900); background: var(--white); margin-bottom: 12px; }
    .cost-input:focus { outline: none; border-color: var(--sage); }
    .trip-history-card { border: 1px solid var(--gray-100); border-radius: var(--radius-md); padding: 14px; margin-bottom: 10px; }
    .trip-history-hdr { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
    .trip-history-date { font-size: 13px; font-weight: 600; color: var(--gray-900); }
    .trip-history-cost { font-size: 13px; color: var(--sage); font-weight: 600; }
    .trip-history-items { font-size: 12px; color: var(--gray-600); line-height: 1.5; }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 12px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; font-family: var(--font-sans); cursor: pointer; border: none; transition: all 0.15s; }
    .btn-sage { background: var(--sage); color: white; width: 100%; }
    .btn-sage:active { opacity: 0.85; }

    /* AI CHAT */
    .chat-area { display: flex; flex-direction: column; height: calc(100vh - 180px); }
    .chat-messages { flex: 1; overflow-y: auto; padding-bottom: 12px; }
    .chat-bubble { padding: 12px 14px; border-radius: var(--radius-md); margin-bottom: 10px; font-size: 14px; line-height: 1.6; }
    .bubble-ai { background: var(--gray-50); border: 1px solid var(--gray-100); color: var(--gray-900); }
    .bubble-user { background: var(--sage); color: white; margin-left: 32px; }
    .bubble-ai strong { color: var(--sage-dark); }
    .chat-input-row { display: flex; gap: 8px; padding-top: 12px; border-top: 1px solid var(--gray-100); }
    .chat-input { flex: 1; border: 1px solid var(--gray-200); border-radius: 24px; padding: 10px 16px; font-size: 14px; font-family: var(--font-sans); }
    .chat-input:focus { outline: none; border-color: var(--sage); }
    .chat-send { width: 42px; height: 42px; border-radius: 50%; background: var(--sage); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .chat-send:active { opacity: 0.8; }
    .quick-btns { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .qbtn { border: 1px solid var(--sage-mid); border-radius: 20px; padding: 6px 14px; font-size: 12px; color: var(--sage); background: var(--sage-light); cursor: pointer; font-family: var(--font-sans); }
    .qbtn:active { background: var(--sage-mid); color: white; }
    .typing { display: flex; gap: 4px; align-items: center; padding: 12px 14px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gray-400); animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
  </style>
</head>
<body>
<div id="app">

  <div class="app-header">
    <h1>Pantry</h1>
    <div class="budget-row">
      <div class="budget-block">
        <div class="budget-label">This week</div>
        <div class="budget-amounts">
          <span class="budget-spent" id="week-spent">$0</span>
          <span class="budget-limit">of $200</span>
        </div>
        <div class="budget-bar-bg"><div class="budget-bar-fill" id="week-bar" style="width:0%"></div></div>
      </div>
      <div class="budget-block">
        <div class="budget-label">This month</div>
        <div class="budget-amounts">
          <span class="budget-spent" id="month-spent">$0</span>
          <span class="budget-limit">of $800</span>
        </div>
        <div class="budget-bar-bg"><div class="budget-bar-fill" id="month-bar" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <div class="scroll-area">

    <!-- PANTRY -->
    <div id="panel-pantry" class="panel active">
      <div class="card"><div class="card-body" id="pantry-list"></div></div>
    </div>

    <!-- PROTEIN LOG -->
    <div id="panel-rotation" class="panel">
      <div class="section-label">Previous proteins</div>
      <div class="card">
        <div class="card-body" id="rotation-log"></div>
      </div>
    </div>

    <!-- TRIPS -->
    <div id="panel-trips" class="panel">
      <div class="section-label">This week's protein</div>
      <div class="protein-grid" id="protein-grid"></div>
      <div id="trip-checklist-area"></div>
      <div class="section-label" style="margin-top:24px">Trip history</div>
      <div id="trip-history"></div>
    </div>

    <!-- ASK CLAUDE -->
    <div id="panel-ai" class="panel">
      <div class="quick-btns">
        <button class="qbtn" onclick="quickPrompt('I am heading to the store — what do I need this week?')">Pre-shop brief</button>
        <button class="qbtn" onclick="quickPrompt('What can I cook tonight? Give me 3 options.')">What can I cook tonight?</button>
        <button class="qbtn" onclick="quickPrompt('What protein should we rotate in this week and why?')">Protein pick</button>
        <button class="qbtn" onclick="quickPrompt('What pantry items are running low and need restocking?')">Restock check</button>
      </div>
      <div class="chat-area">
        <div class="chat-messages" id="chat-messages">
          <div class="chat-bubble bubble-ai">Hey! I know your pantry, your rotation history, and your meal plan. Tap a quick action above or ask me anything.</div>
        </div>
        <div class="chat-input-row">
          <input class="chat-input" id="chat-input" type="text" placeholder="Ask about your pantry..." onkeydown="if(event.key==='Enter')sendChat()" />
          <button class="chat-send" onclick="sendChat()">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>

  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="switchPanel('pantry', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Pantry
    </button>
    <button class="nav-btn" onclick="switchPanel('rotation', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      Protein log
    </button>
    <button class="nav-btn" onclick="switchPanel('trips', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Trips
    </button>
    <button class="nav-btn" onclick="switchPanel('ai', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Ask Claude
    </button>
  </nav>
</div>

<script>
// ── DATA ──
const PANTRY_ITEMS = [
  {name:'Kosher salt',cat:'Dry goods'},{name:'Black pepper',cat:'Dry goods'},
  {name:'Olive oil',cat:'Dry goods'},{name:'Unsalted butter',cat:'Dry goods'},
  {name:'Soy sauce / tamari',cat:'Dry goods'},{name:'Dijon mustard',cat:'Dry goods'},
  {name:'Canned whole tomatoes (2)',cat:'Dry goods'},{name:'Dried pasta',cat:'Dry goods'},
  {name:'Basmati or jasmine rice',cat:'Dry goods'},{name:'Canned chickpeas (2)',cat:'Dry goods'},
  {name:'Canned/dried lentils',cat:'Dry goods'},{name:'Chicken or veg stock',cat:'Dry goods'},
  {name:'Red wine vinegar',cat:'Dry goods'},{name:'Apple cider vinegar',cat:'Dry goods'},
  {name:'Trail mix or nuts',cat:'Dry goods'},{name:'Whole grain bread',cat:'Dry goods'},
  {name:'Natural peanut butter',cat:'Refrigerated goods'},{name:'Jelly or jam',cat:'Refrigerated goods'},
];

const ALWAYS_BUY = ['Garlic (2 heads)','Yellow onions (3–4)','Lemons (6–8)','Carrots (1 bunch)','Celery (1 bunch)','Bananas or apples'];

const SPRING_PRODUCE = ['Spinach','Arugula','Swiss chard','Kale'];

const PROTEINS = [
  {name:'Chicken thighs',cost:'~$10 / week',acid:'Lemons + yogurt'},
  {name:'Salmon',cost:'~$14 / week',acid:'Lemons + capers'},
  {name:'Ground beef',cost:'~$9 / week',acid:'Canned tomatoes + red wine vinegar'},
  {name:'Shrimp',cost:'~$12 / week',acid:'Lemon + capers'},
  {name:'Pork chops',cost:'~$10 / week',acid:'Apple cider vinegar + Dijon'},
  {name:'Lamb',cost:'~$14 / week',acid:'Lemon + red wine vinegar + yogurt'},
  {name:'White fish',cost:'~$12 / week',acid:'Lemon + capers'},
  {name:'Italian sausage',cost:'~$9 / week',acid:'Canned tomatoes + red wine vinegar'},
  {name:'Tofu',cost:'~$6 / week',acid:'Soy sauce + rice vinegar'},
  {name:'Chicken breasts',cost:'~$10 / week',acid:'Lemon + Dijon mustard'},
  {name:'Skirt steak',cost:'~$13 / week',acid:'Red wine vinegar + lemon'},
  {name:'Roast chicken',cost:'~$12 / week',acid:'Lemons + yogurt'},
];

// ── STATE ──
let pantryStatus    = JSON.parse(localStorage.getItem('sfah_pantry')     || '{}');
let rotationState   = JSON.parse(localStorage.getItem('sfah_rotation')   || '[]');
let tripsState      = JSON.parse(localStorage.getItem('sfah_trips')      || '[]');
let checklistState  = JSON.parse(localStorage.getItem('sfah_checklist')  || '{}');
let selectedProtein = null;

// ── PERSIST ──
function persist() {
  localStorage.setItem('sfah_pantry',    JSON.stringify(pantryStatus));
  localStorage.setItem('sfah_rotation',  JSON.stringify(rotationState));
  localStorage.setItem('sfah_trips',     JSON.stringify(tripsState));
}

function persistChecklist() {
  localStorage.setItem('sfah_checklist', JSON.stringify(checklistState));
}

// ── BUDGET ──
function renderBudget() {
  const now = new Date();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - now.getDay());
  weekStart.setHours(0, 0, 0, 0);
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

  function parseCost(str) {
    if (!str || str === '—') return 0;
    const n = parseFloat(str.replace(/[^0-9.]/g, ''));
    return isNaN(n) ? 0 : n;
  }

  const weekSpent  = tripsState.filter(t => new Date(t.date) >= weekStart).reduce((s,t) => s + parseCost(t.cost), 0);
  const monthSpent = tripsState.filter(t => new Date(t.date) >= monthStart).reduce((s,t) => s + parseCost(t.cost), 0);

  document.getElementById('week-spent').textContent  = '$' + weekSpent.toFixed(0);
  document.getElementById('month-spent').textContent = '$' + monthSpent.toFixed(0);

  const wb = document.getElementById('week-bar');
  wb.style.width = Math.min((weekSpent / 200) * 100, 100) + '%';
  wb.classList.toggle('over', weekSpent > 200);

  const mb = document.getElementById('month-bar');
  mb.style.width = Math.min((monthSpent / 800) * 100, 100) + '%';
  mb.classList.toggle('over', monthSpent > 800);
}

// ── PANTRY ──
function renderPantry() {
  const categories = [...new Set(PANTRY_ITEMS.map(i => i.cat))];
  document.getElementById('pantry-list').innerHTML = categories.map(cat => {
    const items = PANTRY_ITEMS.filter(i => i.cat === cat);
    return `<div class="cat-header">${cat}</div>
      ${items.map(item => {
        const s = pantryStatus[item.name] || 'ok';
        return `<div class="pantry-item status-${s}">
          <div class="item-name">${item.name}</div>
          <div class="status-btns">
            <button class="sbtn ${s==='ok'?'active-ok':''}" onclick="setStatus('${item.name}','ok')">Stocked</button>
            <button class="sbtn ${s==='low'?'active-low':''}" onclick="setStatus('${item.name}','low')">Low</button>
            <button class="sbtn ${s==='out'?'active-out':''}" onclick="setStatus('${item.name}','out')">Out</button>
          </div>
        </div>`;
      }).join('')}`;
  }).join('');
}

function setStatus(name, status) {
  pantryStatus[name] = status;
  persist();
  renderPantry();
}

// ── PROTEIN CARDS ──
function renderProteins() {
  const grid = document.getElementById('protein-grid');
  if (selectedProtein !== null) {
    const p = PROTEINS[selectedProtein];
    grid.innerHTML = `
      <div class="pcard selected" style="grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div class="pcard-name">${p.name}</div>
          <div class="pcard-cost">${p.cost}</div>
          <div class="pcard-acid-label">Pairs with</div>
          <div class="pcard-acid">${p.acid}</div>
        </div>
        <button class="change-btn" onclick="cancelProtein()">Change</button>
      </div>`;
  } else {
    grid.innerHTML = PROTEINS.map((p,i) => `
      <div class="pcard" onclick="selectProtein(${i})">
        <div class="pcard-name">${p.name}</div>
        <div class="pcard-cost">${p.cost}</div>
        <div class="pcard-acid-label">Pairs with</div>
        <div class="pcard-acid">${p.acid}</div>
      </div>`).join('');
  }
}

function selectProtein(i) {
  selectedProtein = i;
  checklistState = {};
  persistChecklist();
  renderProteins();
  renderChecklist();
}

function cancelProtein() {
  selectedProtein = null;
  checklistState = {};
  persistChecklist();
  renderProteins();
  renderChecklist();
}

// ── PROTEIN LOG ──
function renderRotationLog() {
  const el = document.getElementById('rotation-log');
  if (!rotationState.length) {
    el.innerHTML = '<div class="rot-empty">No proteins logged yet — complete a trip to start tracking.</div>';
    return;
  }
  const labels = ['This week','Last week','2 weeks ago','3 weeks ago'];
  el.innerHTML = rotationState.map((r,i) => `
    <div class="rotation-row">
      <div class="rot-left">
        <div class="week-label">${labels[i] || `Wk ${i+1}`}</div>
        <div>
          <div class="week-protein">${r.protein}</div>
          <div class="week-acid">${r.acid}</div>
        </div>
      </div>
      <button class="remove-btn" onclick="removeRotationEntry(${i})">×</button>
    </div>`).join('');
}

function removeRotationEntry(i) {
  rotationState.splice(i, 1);
  persist();
  renderRotationLog();
}

// ── TRIP CHECKLIST ──
function buildChecklist() {
  if (selectedProtein === null) return null;
  const p = PROTEINS[selectedProtein];

  const acidItems = p.acid.split('+').map(a => a.trim().replace(/\b\w/g, c => c.toUpperCase()));

  return [
    { label: 'Protein',       items: [{ id: 'protein', name: p.name, sub: p.cost }] },
    { label: 'Acid & dairy',  items: acidItems.map((a,i) => ({ id: 'acid_'+i, name: a })) },
    { label: 'Always buy',    items: ALWAYS_BUY.map((a,i) => ({ id: 'always_'+i, name: a })) },
    { label: 'Spring produce',items: SPRING_PRODUCE.map((a,i) => ({ id: 'produce_'+i, name: a })) },
    ...((() => {
      const restock = PANTRY_ITEMS.filter(i => pantryStatus[i.name] === 'low' || pantryStatus[i.name] === 'out');
      return restock.length ? [{ label: 'Restock', items: restock.map(i => ({ id:'restock_'+i.name, name:i.name, sub: pantryStatus[i.name]==='out'?'Out':'Running low' })) }] : [];
    })())
  ];
}

function renderChecklist() {
  const el = document.getElementById('trip-checklist-area');
  const sections = buildChecklist();

  if (!sections) {
    el.innerHTML = '<div class="trip-prompt"><div class="trip-prompt-text">Select a protein above to automatically generate your shopping list.</div></div>';
    return;
  }

  const allItems = sections.flatMap(s => s.items);
  const progress = Math.round((allItems.filter(i => checklistState[i.id]).length / allItems.length) * 100);

  el.innerHTML = `
    <div class="section-label">Shopping list</div>
    <div style="background:var(--gray-100);border-radius:4px;height:4px;margin-bottom:16px;overflow:hidden;">
      <div style="height:100%;width:${progress}%;background:var(--sage);border-radius:4px;transition:width 0.3s;"></div>
    </div>
    ${sections.map(s => `
      <div class="checklist-section">
        <div class="checklist-section-label">${s.label}</div>
        <div class="card" style="padding:0 16px;">
          ${s.items.map(item => `
            <div class="checklist-item ${checklistState[item.id]?'checked':''}" onclick="toggleCheck('${item.id}')">
              <div class="check-box"><span class="check-tick">✓</span></div>
              <div>
                <div class="check-label">${item.name}</div>
                ${item.sub?`<div class="check-sub">${item.sub}</div>`:''}
              </div>
            </div>`).join('')}
        </div>
      </div>`).join('')}
    <div class="trip-complete-bar">
      <input class="cost-input" type="text" id="trip-cost-input" placeholder="Total cost (e.g. $147)" />
      <button class="btn btn-sage" onclick="completeTrip()">Complete trip</button>
    </div>`;
}

function toggleCheck(id) {
  checklistState[id] = !checklistState[id];
  persistChecklist();
  renderChecklist();
}

function completeTrip() {
  const sections = buildChecklist();
  if (!sections) return;

  const cost  = document.getElementById('trip-cost-input')?.value.trim() || '—';
  const date  = new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
  const items = sections.flatMap(s => s.items.map(i => i.name)).join(', ');

  if (selectedProtein !== null) {
    const p = PROTEINS[selectedProtein];
    rotationState.unshift({protein: p.name, acid: p.acid});
    if (rotationState.length > 4) rotationState = rotationState.slice(0, 4);
  }

  tripsState.push({date, items, cost});
  checklistState  = {};
  selectedProtein = null;
  persistChecklist();
  persist();
  renderBudget();
  renderProteins();
  renderRotationLog();
  renderChecklist();
  renderTrips();
}

function renderTrips() {
  const el = document.getElementById('trip-history');
  if (!tripsState.length) {
    el.innerHTML = '<div class="empty-state">No trips logged yet.</div>';
    return;
  }
  el.innerHTML = tripsState.slice().reverse().map(t => `
    <div class="trip-history-card">
      <div class="trip-history-hdr">
        <div class="trip-history-date">${t.date}</div>
        <div class="trip-history-cost">${t.cost}</div>
      </div>
      <div class="trip-history-items">${t.items}</div>
    </div>`).join('');
}

// ── AI CHAT ──
function addBubble(text, role) {
  const el = document.createElement('div');
  el.className = `chat-bubble bubble-${role}`;
  el.innerHTML = text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  document.getElementById('chat-messages').appendChild(el);
  el.scrollIntoView({behavior:'smooth'});
}

function showTyping() {
  const el = document.createElement('div');
  el.className = 'chat-bubble bubble-ai typing';
  el.id = 'typing-indicator';
  el.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  document.getElementById('chat-messages').appendChild(el);
  el.scrollIntoView({behavior:'smooth'});
}

function removeTyping() {
  document.getElementById('typing-indicator')?.remove();
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addBubble(msg, 'user');
  showTyping();
  try {
    const res  = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message: msg, pantryStatus, rotationHistory: rotationState, tripHistory: tripsState})
    });
    const data = await res.json();
    removeTyping();
    addBubble(data.reply || 'Something went wrong — try again.', 'ai');
  } catch {
    removeTyping();
    addBubble('Could not reach the server. Check your connection.', 'ai');
  }
}

function quickPrompt(msg) {
  document.getElementById('chat-input').value = msg;
  sendChat();
}

// ── NAV ──
function switchPanel(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'trips') { renderProteins(); renderChecklist(); }
}

// ── INIT ──
function init() {
  renderBudget();
  renderPantry();
  renderRotationLog();
  renderProteins();
  renderChecklist();
  renderTrips();
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
